<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verificare Certificat MedTact</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#F5F0E8;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:16px;padding:32px 28px;max-width:480px;width:100%;box-shadow:0 4px 24px rgba(15,31,61,0.10)}
.header{text-align:center;margin-bottom:28px}
.logo{font-size:28px;font-weight:700;color:#0F1F3D;letter-spacing:1px}
.logo span{color:#C8A84A}
.tagline{font-size:13px;color:#888;margin-top:4px}
.divider{height:2px;background:linear-gradient(90deg,#C0392B,#0F1F3D);border-radius:2px;margin:0 auto 24px;width:60px}

/* Stare initiala */
#state-loading{text-align:center;color:#888;font-size:14px;padding:20px 0}
#state-valid{display:none}
#state-invalid{display:none;text-align:center;padding:20px 0}
#state-noserie{display:none;text-align:center;padding:20px 0}

/* Valid */
.badge-valid{display:inline-flex;align-items:center;gap:8px;background:#E8F5E9;color:#1B5E20;border-radius:8px;padding:10px 18px;font-size:15px;font-weight:600;margin-bottom:20px}
.badge-valid .dot{width:10px;height:10px;background:#2E7D32;border-radius:50%}
.info-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:0.5px solid #EEE;font-size:14px}
.info-row:last-child{border-bottom:none}
.info-label{color:#888;font-weight:500}
.info-val{color:#0F1F3D;font-weight:600;text-align:right;max-width:60%}

/* Invalid */
.badge-invalid{display:inline-flex;align-items:center;gap:8px;background:#FFEBEE;color:#B71C1C;border-radius:8px;padding:10px 18px;font-size:15px;font-weight:600;margin-bottom:12px}
.badge-invalid .dot{width:10px;height:10px;background:#C62828;border-radius:50%}
.msg{font-size:13px;color:#888;margin-top:8px}

.footer{text-align:center;margin-top:24px;font-size:12px;color:#BBB}
.footer strong{color:#C8A84A}

/* Search box */
.search-box{margin-top:20px}
.search-box input{width:100%;padding:10px 14px;border:1.5px solid #DDD;border-radius:8px;font-size:14px;outline:none;color:#0F1F3D}
.search-box input:focus{border-color:#0F1F3D}
.search-box button{width:100%;margin-top:8px;padding:10px;background:#0F1F3D;color:#C8A84A;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;letter-spacing:0.5px}
.search-box button:hover{background:#1A3A5C}
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="logo">Med<span>Tact</span></div>
    <div class="tagline">Verificare autenticitate certificat</div>
  </div>
  <div class="divider"></div>

  <div id="state-loading">Se cauta certificatul...</div>

  <div id="state-valid">
    <div style="text-align:center;margin-bottom:16px">
      <div class="badge-valid"><span class="dot"></span> Certificat valid</div>
    </div>
    <div id="info-rows"></div>
  </div>

  <div id="state-invalid">
    <div class="badge-invalid"><span class="dot"></span> Certificat negasit</div>
    <div class="msg">Seria introdusa nu exista in baza noastra de date.<br>Verifica numarul seriei de pe certificat.</div>
  </div>

  <div id="state-noserie">
    <div style="color:#888;font-size:14px;margin-bottom:4px">Introdu seria certificatului:</div>
    <div class="search-box">
      <input id="serie-input" type="text" placeholder="ex: MT-BLS-2026-0025" />
      <button onclick="searchManual()">Verifica</button>
    </div>
  </div>

  <div class="footer">
    Emis de <strong>MedTact</strong> · Țugui Dan PFA · CUI 53999242
  </div>
</div>

<script>
var DB_URL = 'https://tuguidaniasi-wq.github.io/medtact-verify/certificates.json';

function getParam(name) {
  var url = new URL(window.location.href);
  return url.searchParams.get(name) || url.searchParams.get(name.toLowerCase());
}

function showValid(c) {
  document.getElementById('state-loading').style.display = 'none';
  document.getElementById('state-valid').style.display = 'block';
  var rows = [
    ['Titular', c.nume],
    ['Serie', c.serie],
    ['Data cursului', c.data],
    ['Locatie', c.loc],
    ['Curs', c.curs || 'Prim ajutor de baza BLS-AED ERC 2025'],
    ['Trainer', c.trainer || 'Dan Tugui'],
  ];
  var html = '';
  rows.forEach(function(r) {
    html += '<div class="info-row"><span class="info-label">'+r[0]+'</span><span class="info-val">'+r[1]+'</span></div>';
  });
  document.getElementById('info-rows').innerHTML = html;
}

function showInvalid() {
  document.getElementById('state-loading').style.display = 'none';
  document.getElementById('state-invalid').style.display = 'block';
  setTimeout(function(){
    document.getElementById('state-invalid').style.display = 'none';
    document.getElementById('state-noserie').style.display = 'block';
  }, 2000);
}

function showNoSerie() {
  document.getElementById('state-loading').style.display = 'none';
  document.getElementById('state-noserie').style.display = 'block';
}

function searchSerie(serie) {
  fetch(DB_URL + '?t=' + Date.now())
    .then(function(r){ return r.json(); })
    .then(function(db) {
      var found = db.find(function(c){
        return c.serie && c.serie.toUpperCase() === serie.toUpperCase();
      });
      if (found) showValid(found);
      else showInvalid();
    })
    .catch(function(){ showInvalid(); });
}

function searchManual() {
  var val = document.getElementById('serie-input').value.trim();
  if (!val) return;
  document.getElementById('state-noserie').style.display = 'none';
  document.getElementById('state-loading').style.display = 'block';
  searchSerie(val);
}

window.onload = function() {
  var serie = getParam('serie');
  if (serie) {
    searchSerie(serie);
  } else {
    showNoSerie();
  }
};
</script>
</body>
</html>
